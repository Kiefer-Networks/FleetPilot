name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: stable

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Pre-flight: extract version, run lint + tests (gate)
  # ─────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Extract version from pubspec.yaml
        run: |
          FULL=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          VERSION=$(echo "$FULL" | cut -d'+' -f1)
          BUILD=$(echo "$FULL" | cut -d'+' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION+$BUILD"

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n
      - run: flutter analyze --fatal-infos
      - run: flutter test

  # ─────────────────────────────────────────────────────────────────────────
  # Android APK (signed)
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Android (APK)
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks

      - name: Create key.properties
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF
          sed -i 's/^[[:space:]]*//' android/key.properties

      - name: Build signed APK
        run: flutter build apk --release

      - name: Build signed App Bundle
        run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ─────────────────────────────────────────────────────────────────────────
  # iOS (unsigned .app archive)
  # ─────────────────────────────────────────────────────────────────────────
  build-ios:
    name: iOS (Archive)
    needs: preflight
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter gen-l10n

      - name: Build iOS archive
        run: flutter build ios --no-codesign

      - name: Package .app as ZIP
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          APP_PATH=$(find build/ios -name "*.app" -type d | head -1)
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/FleetPilot-${VERSION}-ios.zip" "$(basename "$APP_PATH")"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: '*.zip'

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [preflight, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Collect release assets
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          mkdir -p release-assets

          # Android APK
          cp artifacts/android-apk/app-release.apk \
             "release-assets/FleetPilot-${VERSION}-android.apk" 2>/dev/null || true

          # Android App Bundle
          cp artifacts/android-aab/app-release.aab \
             "release-assets/FleetPilot-${VERSION}-android.aab" 2>/dev/null || true

          # iOS
          cp artifacts/ios-app/*.zip release-assets/ 2>/dev/null || true

          ls -lh release-assets/

      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "${{ github.ref_name }}" ]; then
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" -20 --no-merges)
          fi

          cat > release-notes.md <<NOTES
          ## FleetPilot ${VERSION}

          ### Changes
          ${COMMITS}

          ### Downloads

          | Platform | File |
          |----------|------|
          | Android (signed APK) | \`FleetPilot-${VERSION}-android.apk\` |
          | Android (App Bundle) | \`FleetPilot-${VERSION}-android.aab\` |
          | iOS (unsigned archive) | \`FleetPilot-${VERSION}-ios.zip\` |

          ### Install

          **Android:** Download and install the APK, or upload the AAB to Google Play Console.

          **iOS:** The archive is unsigned. Use Xcode or Transporter to sign and submit to App Store Connect.

          ---
          **Kiefer Networks** | [kiefer-networks.de](https://kiefer-networks.de)
          NOTES
          sed -i 's/^          //' release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FleetPilot ${{ needs.preflight.outputs.version }}
          draft: false
          body_path: release-notes.md
          files: release-assets/*
