name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: stable

jobs:
  lint:
    name: Lint, Analyze & L10n
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Verify l10n completeness
        run: |
          # Extract top-level translation keys (exclude @-metadata keys)
          EN_KEYS=$(jq -r 'keys[] | select(startswith("@") | not)' lib/l10n/app_en.arb | sort -u)
          ERRORS=0

          for ARB in lib/l10n/app_de.arb lib/l10n/app_es.arb; do
            LOCALE=$(basename "$ARB" .arb | sed 's/app_//')
            ARB_KEYS=$(jq -r 'keys[] | select(startswith("@") | not)' "$ARB" | sort -u)

            MISSING=$(comm -23 <(echo "$EN_KEYS") <(echo "$ARB_KEYS"))
            if [ -n "$MISSING" ]; then
              echo "::error::Missing keys in $LOCALE: $MISSING"
              ERRORS=1
            fi

            EXTRA=$(comm -13 <(echo "$EN_KEYS") <(echo "$ARB_KEYS"))
            if [ -n "$EXTRA" ]; then
              echo "::warning::Extra keys in $LOCALE (not in EN): $EXTRA"
            fi
          done

          if [ "$ERRORS" -ne 0 ]; then
            echo "::error::Translation check failed — missing keys found."
            exit 1
          fi
          echo "All translations complete."

      - name: Flutter analyze
        run: flutter analyze --fatal-infos

      - name: Check formatting
        run: dart format --set-exit-if-changed lib/ test/

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Run tests
        run: flutter test --reporter expanded
